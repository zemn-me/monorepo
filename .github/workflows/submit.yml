# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
---

name: Submit
# yamllint disable rule:line-length
#

on:   # yamllint disable-line rule:truthy
  push:
    branches:
      - main


env:
  BAZEL: ./sh/bin/bazel


jobs:
  UploadToBazelRemoteCache:
    name: Upload to Bazel remote cache
    permissions:
      contents: read
      id-token: write
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    # Re-run the offline presubmit in this privileged push workflow so the
    # results are uploaded to the BuildBuddy cache.
    runs-on: ubuntu-latest
    steps:
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # main
        with:
          android: true
          dotnet: true
          haskell: true
          docker-images: true
          swap-storage: true
          large-packages: false
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: 'google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093' # v3.0.0
        name: Acquire federated GCloud credentials for secrets...
        id: secret_auth
        with:
          project_id: 'extreme-cycling-441523-a9'
          workload_identity_provider: 'projects/845702659200/locations/global/workloadIdentityPools/github/providers/my-repo'
      - uses: 'google-github-actions/get-secretmanager-secrets@bc9c54b29fdffb8a47776820a7d26e77b379d262' # v3.0.0
        name: Read CI secrets from Secret Manager
        id: secrets
        with:
          secrets: |-
            buildbuddy_api_key:extreme-cycling-441523-a9/github-actions-buildbuddy-api-key
            npm_token:extreme-cycling-441523-a9/github-actions-npm-token
      - name: Upload to Bazel remote cache
        run: |
          ./.github/workflows/prepare_ci.sh
          echo "::group::Cache upload prep"
          $BAZEL build --config=ci --tool_tag=upload-to-bazel-remote-cache //ci:presubmit
          echo "::endgroup::"
          echo "::group::Upload to Bazel remote cache"
          $BAZEL run --config=ci --tool_tag=upload-to-bazel-remote-cache //ci:presubmit -- --skip-pulumi-deploy
          echo "::endgroup::"
        env:
          NPM_TOKEN: ${{ steps.secrets.outputs.npm_token }}
          NODE_AUTH_TOKEN: ${{ steps.secrets.outputs.npm_token }}
          BUILDBUDDY_API_KEY: ${{ steps.secrets.outputs.buildbuddy_api_key }}
  Submit:
    permissions:
      contents: read
      id-token: write
    concurrency:
      group: pulumi_deploy
      cancel-in-progress: false
      queue: max
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    # Attempts to submit changes to production.
    runs-on: ubuntu-latest
    steps:
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # main
        with:
          android: true
          dotnet: true
          haskell: true
          docker-images: true
          swap-storage: true
          large-packages: false
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: 'google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093' # v3.0.0
        name: Acquire federated GCloud credentials for secrets...
        id: secret_auth
        with:
          project_id: 'extreme-cycling-441523-a9'
          workload_identity_provider: 'projects/845702659200/locations/global/workloadIdentityPools/github/providers/my-repo'
      - uses: 'google-github-actions/get-secretmanager-secrets@bc9c54b29fdffb8a47776820a7d26e77b379d262' # v3.0.0
        name: Read CI secrets from Secret Manager
        id: secrets
        with:
          secrets: |-
            buildbuddy_api_key:extreme-cycling-441523-a9/github-actions-buildbuddy-api-key
            npm_token:extreme-cycling-441523-a9/github-actions-npm-token
            personal_phone_number:extreme-cycling-441523-a9/github-actions-personal-phone-number
            pulumi_access_token:extreme-cycling-441523-a9/github-actions-pulumi-access-token
            twilio_account_sid:extreme-cycling-441523-a9/github-actions-twilio-account-sid
            twilio_api_key_sid:extreme-cycling-441523-a9/github-actions-twilio-api-key-sid
            twilio_auth_token:extreme-cycling-441523-a9/github-actions-twilio-auth-token
      - uses: 'google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093' # v3.0.0
        name: Acquire federated GCloud deploy credentials...
        id: auth
        with:
          project_id: 'extreme-cycling-441523-a9'
          workload_identity_provider: 'projects/845702659200/locations/global/workloadIdentityPools/github/providers/my-repo'
          service_account: monorepo-root@extreme-cycling-441523-a9.iam.gserviceaccount.com
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: arn:aws:iam::658613637108:role/monorepo_github_actions_role-4ad3390
          role-session-name: github-actions-${{ github.run_id }}
          aws-region: us-east-1
      - name: Submit
        # Use npx to try to generate only
        # $BAZEL generated node_modules
        run: |
          ./.github/workflows/prepare_ci.sh
          $BAZEL run --config=ci --tool_tag=submit //ci:submit
        env:
          NPM_TOKEN: ${{ steps.secrets.outputs.npm_token }}
          NODE_AUTH_TOKEN: ${{ steps.secrets.outputs.npm_token }}
          GITHUB_TOKEN: ${{ github.token }}
          BUILDBUDDY_API_KEY: ${{ steps.secrets.outputs.buildbuddy_api_key }}
          PULUMI_ACCESS_TOKEN: ${{ steps.secrets.outputs.pulumi_access_token }}
          TWILIO_ACCOUNT_SID: ${{ steps.secrets.outputs.twilio_account_sid }}
          TWILIO_API_KEY_SID: ${{ steps.secrets.outputs.twilio_api_key_sid }}
          TWILIO_AUTH_TOKEN: ${{ steps.secrets.outputs.twilio_auth_token }}
          # i guess if you exfil this secret you can also call me instead
          # of making a security report 🤣
          PERSONAL_PHONE_NUMBER: ${{ steps.secrets.outputs.personal_phone_number }}
