# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
---


name: Renovate
# yamllint disable rule:line-length
concurrency:
  # if another instance of renovate is running,
  # do not attempt to run overlapping instances.
  group: renovate
on: # yamllint disable-line rule:truthy
  schedule:
    # The "*" (#42, asterisk) character has special semantics in YAML, so this
    # string has to be quoted.
    - cron: '0/15 * * * *'
jobs:
  renovate:
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: 'google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093' # v3.0.0
        name: Acquire federated GCloud credentials...
        id: auth
        continue-on-error: true
        with:
          project_id: 'extreme-cycling-441523-a9'
          workload_identity_provider: 'projects/845702659200/locations/global/workloadIdentityPools/github/providers/my-repo'
          service_account: monorepo-root@extreme-cycling-441523-a9.iam.gserviceaccount.com
      - uses: 'google-github-actions/get-secretmanager-secrets@bc9c54b29fdffb8a47776820a7d26e77b379d262' # v3.0.0
        if: steps.auth.outcome == 'success'
        name: Read Renovate token from Secret Manager
        id: secrets
        continue-on-error: true
        with:
          secrets: |-
            gh_pat:extreme-cycling-441523-a9/github-actions-gh-pat
      - name: Self-hosted Renovate
        uses: renovatebot/github-action@693b9ef15eec82123529a37c782242f091365961 # v46.1.14
        with:
          configurationFile: .github/renovate-global.json
          renovate-version: ${{ env.RENOVATE_VERSION }}
          token: ${{ steps.secrets.outputs.gh_pat || secrets.GH_PAT }}
    env:
      LOG_LEVEL: 'debug'
